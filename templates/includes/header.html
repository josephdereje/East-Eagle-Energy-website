<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ seo_title|default:"East Eagle Energy | Energy Solutions" }}</title>
  <meta name="description" content="{{ seo_description|default:"East Eagle Energy - Global provider of solar inverters, LiFePO4 batteries, and energy storage systems. Reliable solar power solutions for homes and businesses worldwide. Energy That Never Grows Weary." }}">
  <meta name="keywords" content="{{ seo_keywords|default:"East Eagle Energy, solar energy, solar inverter, battery storage, energy solutions, LiFePO4 battery, Deye inverter, Growatt, BESS, renewable energy, global solar solutions" }}">
  <meta name="robots" content="index, follow">
  <meta name="author" content="East Eagle Energy">
  <link rel="canonical" href="https://www.easteagleenergy.com{{ request.path }}">

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp previews) -->
  <meta property="og:type" content="{{ og_type|default:"website" }}">
  <meta property="og:title" content="{{ seo_title|default:"East Eagle Energy | Energy Solutions" }}">
  <meta property="og:description" content="{{ seo_description|default:"Global provider of solar inverters, LiFePO4 batteries, and energy storage systems. Reliable solar power solutions for homes and businesses worldwide." }}">
  <meta property="og:image" content="{{ og_image|default:"https://www.easteagleenergy.com/images/logo.png" }}">
  <meta property="og:url" content="https://www.easteagleenergy.com{{ request.path }}">
  <meta property="og:site_name" content="East Eagle Energy">
  <meta property="og:locale" content="en_US">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ seo_title|default:"East Eagle Energy" }}">
  <meta name="twitter:description" content="{{ seo_description|default:"Global provider of solar energy solutions. Inverters, batteries, and energy storage systems worldwide." }}">
  <meta name="twitter:image" content="{{ og_image|default:"https://www.easteagleenergy.com/images/logo.png" }}">

  <!-- Schema.org structured data -->
  <script type="application/ld+json">{{ schema_json|default:"{}" }}</script>

  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Favicons -->
  <link rel="icon" href="/images/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/images/favicon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <link rel="shortcut icon" href="/images/favicon.png">
</head>
<body>

  <div class="top-bar">
    <div class="container top-bar-inner">
      <a href="tel:+251933219802"><i class="fa fa-phone"></i> +251 93 321 9802</a>
      <span class="tagline">Energy That Never Grows Weary</span>
      <div class="top-bar-right">
        <span class="location"><i class="fa fa-location-dot"></i> Addis Ababa, Ethiopia</span>
        <div class="social-links social-links--compact" data-social-links></div>
      </div>
    </div>
  </div>

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <img src="/images/logo.png" alt="East Eagle Energy" class="logo-img">
      </a>

      <button class="menu-toggle" aria-label="Toggle menu">
        <i class="fa fa-bars"></i>
      </button>

      <nav class="main-nav">
        <a href="/#home" {% if request.path == '/' %}class="active"{% endif %}>Home</a>
        <a href="/#about">About</a>
        <a href="/#services">Services</a>
        <a href="/products/" {% if '/products' in request.path %}class="active"{% endif %}>Products</a>
        <a href="/blog/" {% if '/blog' in request.path %}class="active"{% endif %}>Blog</a>
        <a href="/contact/" {% if '/contact' in request.path %}class="active"{% endif %}>Contact</a>
      </nav>

      <div class="header-actions">
        <!-- Search Toggle Button -->
        <button class="header-search-toggle" id="searchToggle" aria-label="Search products">
          <i class="fa fa-search"></i>
        </button>
        <a href="/contact/" class="btn btn-primary">Get a Quote</a>
      </div>
    </div>
    
    <!-- Header Search Dropdown -->
    <div class="header-search-dropdown" id="headerSearchDropdown">
      <div class="container">
        <form method="get" action="{% url 'products:search' %}" class="header-search-form">
          <input 
            type="text" 
            name="q" 
            placeholder="Search products (e.g., Deye, inverter, battery)" 
            class="header-search-input"
            id="headerSearchInput"
          >
          <button type="submit" class="header-search-submit">
            <i class="fa fa-search"></i> Search
          </button>
        </form>
        <div class="header-search-quick">
          <span>Popular:</span>
          <a href="{% url 'products:search' %}?q=Deye">Deye</a>
          <a href="{% url 'products:search' %}?q=inverter">Inverter</a>
          <a href="{% url 'products:search' %}?q=battery">Battery</a>
          <a href="{% url 'products:search' %}?q=5kW">5kW</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Search Overlay -->
  <div class="search-overlay" id="searchOverlay"></div>
